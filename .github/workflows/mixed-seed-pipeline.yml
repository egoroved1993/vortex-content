name: Mixed Seed Pipeline

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Total mixed job count before generation"
        required: false
        default: "240"
      model:
        description: "Model to use (e.g. gpt-4o-mini, grok-3-fast, claude-3-5-haiku-latest)"
        required: false
        default: "gpt-4o-mini"
      upload:
        description: "Upload approved payload to Supabase"
        type: boolean
        required: false
        default: false
      mix:
        description: "Comma-separated source families"
        required: false
        default: "launch,public,review,forum,signals,news,social,world,bridge"
      city_focus:
        description: "Optional city focus"
        required: false
        default: ""

concurrency:
  group: mixed-seed-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      MODEL_COST_GPT_4O_INPUT_PER_1M_USD: "2.5"
      MODEL_COST_GPT_4O_OUTPUT_PER_1M_USD: "10"
      MODEL_COST_GPT_4O_MINI_INPUT_PER_1M_USD: "0.15"
      MODEL_COST_GPT_4O_MINI_OUTPUT_PER_1M_USD: "0.6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve run configuration
        id: cfg
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Rotate provider+model by day-of-year mod 5
            # Slot 4 (anthropic) activates only if ANTHROPIC_API_KEY is set, else falls back to slot 0
            DAY_SLOT=$(( $(date -u +%j) % 5 ))
            if [ "$DAY_SLOT" = "4" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
              DAY_SLOT=0
            fi
            case $DAY_SLOT in
              0) SCHED_PROVIDER=openai;    SCHED_MODEL=gpt-4o-mini ;;
              1) SCHED_PROVIDER=openai;    SCHED_MODEL=gpt-4o-mini ;;
              2) SCHED_PROVIDER=openai;    SCHED_MODEL=gpt-4o ;;
              3) SCHED_PROVIDER=openai;    SCHED_MODEL=gpt-4o-mini ;;
              4) SCHED_PROVIDER=anthropic; SCHED_MODEL=claude-3-5-haiku-latest ;;
            esac
            echo "provider=${SCHED_PROVIDER}" >> "$GITHUB_OUTPUT"
            echo "count=240" >> "$GITHUB_OUTPUT"
            echo "model=${SCHED_MODEL}" >> "$GITHUB_OUTPUT"
            echo "upload=true" >> "$GITHUB_OUTPUT"
            echo "mix=launch,public,review,forum,signals,news,social,world,bridge" >> "$GITHUB_OUTPUT"
            echo "city_focus=" >> "$GITHUB_OUTPUT"
            echo "seed=mixed-cron-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          else
            MANUAL_MODEL="${{ inputs.model || 'gpt-4o-mini' }}"
            if [[ "$MANUAL_MODEL" == gpt-* ]]; then
              MANUAL_PROVIDER=openai
            elif [[ "$MANUAL_MODEL" == grok-* ]]; then
              MANUAL_PROVIDER=xai
            elif [[ "$MANUAL_MODEL" == claude-* ]]; then
              MANUAL_PROVIDER=anthropic
            else
              MANUAL_PROVIDER=openai
            fi
            echo "provider=${MANUAL_PROVIDER}" >> "$GITHUB_OUTPUT"
            echo "count=${{ inputs.count || '240' }}" >> "$GITHUB_OUTPUT"
            echo "model=${MANUAL_MODEL}" >> "$GITHUB_OUTPUT"
            echo "upload=${{ inputs.upload && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "mix=${{ inputs.mix || 'launch,public,review,forum,signals,news,social,world,bridge' }}" >> "$GITHUB_OUTPUT"
            echo "city_focus=${{ inputs.city_focus }}" >> "$GITHUB_OUTPUT"
            echo "seed=mixed-manual-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh public comment corpus
        continue-on-error: true
        run: node scripts/fetch-reddit-comments.mjs --per-city 80 --out content/public-human-comments.json

      - name: Refresh city news
        continue-on-error: true
        run: node scripts/fetch-city-news.mjs --out content/news-snippets.json

      - name: Refresh city social from X
        if: env.XAI_API_KEY != ''
        continue-on-error: true
        run: node scripts/refresh-social-snippets.mjs --out content/social-snippets.json

      - name: Refresh world trends from X
        if: env.XAI_API_KEY != ''
        continue-on-error: true
        run: node scripts/refresh-world-trends.mjs --out content/world-trends.json

      - name: Show source corpus sizes
        run: |
          node -e "const fs=require('fs'); const files=['content/public-human-comments.json','content/place-review-snippets.json','content/forum-snippets.json','content/city-signals.json','content/news-snippets.json','content/social-snippets.json','content/world-trends.json']; const out={}; for (const f of files){try{const raw=JSON.parse(fs.readFileSync(f,'utf8')); out[f]=Array.isArray(raw)?raw.length:'not-array';}catch(e){out[f]='missing';}} console.log(JSON.stringify(out,null,2));"

      - name: Fetch fresh places (Foursquare + Google)
        continue-on-error: true
        env:
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/fetch-city-places.mjs --out content/fetched-places.json

      - name: Run mixed seed pipeline
        env:
          MODEL_NAME: ${{ steps.cfg.outputs.model }}
          MODEL_PROVIDER: ${{ steps.cfg.outputs.provider || 'openai' }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(
            --count "${{ steps.cfg.outputs.count }}"
            --seed "${{ steps.cfg.outputs.seed }}"
            --mix "${{ steps.cfg.outputs.mix }}"
            --public-input content/public-human-comments.json
            --review-input content/place-review-snippets.json
            --forum-input content/forum-snippets.json
            --signals-input content/city-signals.json
            --news-input content/news-snippets.json
            --social-input content/social-snippets.json
            --world-input content/world-trends.json
          )

          if [ -n "${{ steps.cfg.outputs.city_focus }}" ]; then
            ARGS+=( --city-focus "${{ steps.cfg.outputs.city_focus }}" )
          fi

          if [ "${{ steps.cfg.outputs.upload }}" = "true" ]; then
            ARGS+=( --upload --upload-city-pulse )
          fi

          node scripts/run-seed-pipeline.mjs "${ARGS[@]}"

      - name: Run place-discovery pipeline
        if: ${{ steps.cfg.outputs.upload == 'true' }}
        env:
          MODEL_NAME: ${{ steps.cfg.outputs.model }}
          MODEL_PROVIDER: ${{ steps.cfg.outputs.provider || 'openai' }}
        shell: bash
        run: |
          set -euo pipefail
          # Build 6 place-discovery jobs per city (24 total) — targets ~15% of final feed
          node scripts/build-place-discovery-jobs.mjs \
            --max-per-city 6 \
            --out content/place-discovery-jobs.json

          node scripts/generate-seed-candidates.mjs \
            --input content/place-discovery-jobs.json \
            --out content/place-discovery-candidates.json \
            --concurrency 2

          # Prepare payload (lower thresholds — place messages are short/simple by design)
          node scripts/prepare-seed-payload.mjs \
            --candidates content/place-discovery-candidates.json \
            --out content/place-discovery-payload.json \
            --min-score 1 \
            --min-mindprint 1 \
            --min-ambiguity 1 \
            --min-composite-score 1

          # Upload to Supabase
          node scripts/upload-seed-payload.mjs \
            --input content/place-discovery-payload.json

      - name: Check content quality
        if: always()
        continue-on-error: true
        run: |
          node scripts/check-content-quality.mjs \
            --payload content/pipeline-payload.json \
            --place-payload content/place-discovery-payload.json \
            --out content/quality-report.json

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mixed-seed-pipeline-${{ github.run_id }}
          path: |
            content/pipeline-jobs.json
            content/pipeline-jobs.launch.json
            content/pipeline-jobs.public.json
            content/pipeline-jobs.review.json
            content/pipeline-jobs.forum.json
            content/pipeline-jobs.signals.json
            content/pipeline-jobs.news.json
            content/pipeline-jobs.social.json
            content/pipeline-jobs.world.json
            content/pipeline-jobs.bridge.json
            content/pipeline-candidates.json
            content/pipeline-candidates.report.json
            content/pipeline-payload.json
            content/city-pulse.latest.json
            content/place-discovery-jobs.json
            content/place-discovery-candidates.json
            content/place-discovery-payload.json
            content/quality-report.json
          if-no-files-found: warn
