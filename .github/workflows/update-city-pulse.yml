name: Update City Pulse

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC daily
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload pulse to Supabase"
        type: boolean
        required: false
        default: false

concurrency:
  group: update-city-pulse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch city news
        run: node scripts/fetch-city-news.mjs

      - name: Refresh city social from X
        if: env.XAI_API_KEY != ''
        run: node scripts/refresh-social-snippets.mjs

      - name: Refresh world trends from X
        if: env.XAI_API_KEY != ''
        continue-on-error: true
        run: node scripts/refresh-world-trends.mjs

      - name: Refresh static corpora
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/refresh-static-corpora.mjs --skip-social

      - name: Build city pulse
        run: node scripts/build-city-pulse.mjs --world-input content/world-trends.json

      - name: Show pulse summary
        run: |
          echo "=== city-pulse.latest.json ==="
          cat content/city-pulse.latest.json | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              const d = JSON.parse(chunks.join(''));
              for (const r of d.rows) {
                console.log(r.city_id, r.mood_label, r.mood_score.toFixed(3));
              }
            });
          "

      - name: Upload to Supabase
        if: ${{ github.event_name == 'schedule' || inputs.upload == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/upload-city-pulse-payload.mjs

      - name: Commit updated pulse
        if: ${{ github.event_name == 'schedule' || inputs.upload == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/city-pulse.latest.json content/news-snippets.json content/city-signals.json content/forum-snippets.json content/social-snippets.json content/world-trends.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update city pulse $(date -u +%Y-%m-%d)"
            git push
          fi
