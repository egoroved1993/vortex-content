name: Update City Pulse

on:
  schedule:
    - cron: "0 * * * *"    # every hour
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload pulse to Supabase"
        type: boolean
        required: false
        default: false

concurrency:
  group: update-city-pulse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      TG_WORK_API_ID: ${{ secrets.TG_WORK_API_ID }}
      TG_WORK_API_HASH: ${{ secrets.TG_WORK_API_HASH }}
      TG_WORK_SESSION: ${{ secrets.TG_WORK_SESSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Fetch city news
        run: node scripts/fetch-city-news.mjs

      - name: Fetch city places from Foursquare + Google
        continue-on-error: true
        env:
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/fetch-city-places.mjs

      - name: Fetch city events from Eventbrite
        if: env.EVENTBRITE_API_KEY != ''
        continue-on-error: true
        env:
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
        run: node scripts/fetch-city-events.mjs

      - name: Fetch Resident Advisor Berlin nightlife
        continue-on-error: true
        run: node scripts/fetch-ra-berlin.mjs

      - name: Fetch Google Trends
        continue-on-error: true
        run: node scripts/fetch-google-trends.mjs

      - name: Fetch transport disruptions
        continue-on-error: true
        env:
          TRANSIT_511_KEY: ${{ secrets.TRANSIT_511_KEY }}
          TMB_APP_ID: ${{ secrets.TMB_APP_ID }}
          TMB_APP_KEY: ${{ secrets.TMB_APP_KEY }}
        run: node scripts/fetch-transport.mjs

      - name: Fetch weather signals
        continue-on-error: true
        run: node scripts/fetch-weather.mjs

      - name: Fetch sports results
        continue-on-error: true
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/fetch-sports.mjs

      - name: Fetch Telegram group pulse
        if: env.TG_WORK_SESSION != ''
        continue-on-error: true
        run: node scripts/fetch-telegram-pulse.mjs

      - name: Refresh city social from X
        if: env.XAI_API_KEY != ''
        run: node scripts/refresh-social-snippets.mjs

      - name: Refresh world trends from X
        if: env.XAI_API_KEY != ''
        continue-on-error: true
        run: node scripts/refresh-world-trends.mjs

      - name: Refresh static corpora
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/refresh-static-corpora.mjs --skip-social

      - name: Build city pulse
        run: node scripts/build-city-pulse.mjs --world-input content/world-trends.json

      - name: Show pulse summary
        run: |
          echo "=== city-pulse.latest.json ==="
          cat content/city-pulse.latest.json | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              const d = JSON.parse(chunks.join(''));
              for (const r of d.rows) {
                console.log(r.city_id, r.mood_label, r.mood_score.toFixed(3));
              }
            });
          "

      - name: Upload to Supabase
        if: ${{ github.event_name == 'schedule' || inputs.upload == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/upload-city-pulse-payload.mjs

      - name: Upload Telegram messages to Supabase
        if: ${{ (github.event_name == 'schedule' || inputs.upload == true) && env.TG_WORK_SESSION != '' }}
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/upload-telegram-messages.mjs

      - name: Commit updated pulse
        if: ${{ github.event_name == 'schedule' || inputs.upload == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-missing content/city-pulse.latest.json content/news-snippets.json content/events-snippets.json content/fetched-places.json content/city-signals.json content/forum-snippets.json content/social-snippets.json content/world-trends.json content/telegram-uploaded-hashes.json content/ra-berlin-events.json content/google-trends.json content/transport-signals.json content/weather-signals.json content/sports-signals.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update city pulse $(date -u +%Y-%m-%d)"
            git push
          fi
