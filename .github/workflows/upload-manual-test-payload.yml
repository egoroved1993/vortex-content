name: Upload Manual Test Payload

on:
  workflow_dispatch:
    inputs:
      payload_path:
        description: "Path to committed payload json"
        required: false
        default: "content/manual-test-payload.json"
      expire_existing:
        description: "Expire existing generated feed before upload"
        type: boolean
        required: false
        default: true

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show payload stats
        shell: bash
        run: |
          set -euo pipefail
          node -e "const fs=require('fs'); const p='${{ inputs.payload_path }}'; const data=JSON.parse(fs.readFileSync(p,'utf8')); console.log(JSON.stringify({payload:p, selectedCount:data?.meta?.selectedCount ?? (data.rows?.length ?? 0), rows:data.rows?.length ?? 0}, null, 2));"

      - name: Expire existing generated feed
        if: ${{ inputs.expire_existing == true }}
        run: node scripts/expire-active-seed-messages.mjs

      - name: Upload manual payload
        run: node scripts/upload-seed-payload.mjs --input "${{ inputs.payload_path }}"
